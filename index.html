<title>LOCUS — Schedule & Quote Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #F4F5F7; color: #1A1A2E; -webkit-font-smoothing: antialiased; }
  input, select, textarea, button { font-family: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #F4F5F7; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;
const PHASE_CATEGORIES = [
  { id:"management", label:"Management", color:"#FF6B35",
    phases:[
      {id:"pd",label:"PD",color:"#FF6B35"},
      {id:"director",label:"Director",color:"#FF8C5A"},
      {id:"supervisor",label:"Supervisor",color:"#FFB085"}]},
  { id:"preproduction", label:"PreProduction", color:"#A78BFA",
    phases:[
      {id:"design",label:"Design",color:"#A78BFA"},
      {id:"storyboard_reel",label:"StoryBoard Reel",color:"#C4B5FD"}]},
  { id:"mainproduction", label:"MainProduction", color:"#34D399",
    phases:[
      {id:"modeling",label:"Modeling",color:"#34D399"},
      {id:"texture_shading",label:"Texture / Shading",color:"#6EE7B7"},
      {id:"rigging",label:"Rigging",color:"#059669"},
      {id:"animation_main",label:"Animation",color:"#6B9ECC"},
      {id:"lighting_render",label:"Lighting & Render",color:"#F59E0B"},
      {id:"simulation",label:"Simulation",color:"#FCD34D"},
      {id:"fx",label:"FX",color:"#F472B6"},
      {id:"composition",label:"Composition",color:"#FB7185"}]},
  { id:"postproduction", label:"PostProduction", color:"#6B9ECC",
    phases:[
      {id:"edit",label:"Edit",color:"#6B9ECC"},
      {id:"color_grading",label:"Color Grading",color:"#93C5FD"},
      {id:"sound_post",label:"Sound (Dub, Music, SFX, Mix)",color:"#A5B4FC"}]}
];
const ALL_PHASES = PHASE_CATEGORIES.flatMap(c=>c.phases.map(p=>({...p,categoryId:c.id,categoryLabel:c.label,categoryColor:c.color})));
const getPhase = id => ALL_PHASES.find(p=>p.id===id);

const ROLE_CATEGORIES = [
  { id:"management", label:"Management", color:"#FF6B35",
    roles:[
      {id:"pd",label:"PD",unit:"일",defaultRate:600000},
      {id:"director",label:"Director",unit:"일",defaultRate:500000},
      {id:"supervisor",label:"Supervisor",unit:"일",defaultRate:450000}]},
  { id:"preproduction", label:"PreProduction", color:"#A78BFA",
    roles:[
      {id:"storyboard_artist",label:"StoryBoard Artist",unit:"일",defaultRate:350000},
      {id:"designer",label:"Designer",unit:"일",defaultRate:350000}]},
  { id:"mainproduction", label:"MainProduction", color:"#34D399",
    roles:[
      {id:"modeler",label:"Modeler",unit:"일",defaultRate:400000},
      {id:"texture_shading",label:"Texture/Shading Artist",unit:"일",defaultRate:380000},
      {id:"rigger",label:"Rigger",unit:"일",defaultRate:380000},
      {id:"animator",label:"Animator",unit:"일",defaultRate:420000},
      {id:"lighting_render",label:"Lighting & Render Artist",unit:"일",defaultRate:400000},
      {id:"simulator",label:"Simulator",unit:"일",defaultRate:400000},
      {id:"fx_artist",label:"FX Artist",unit:"일",defaultRate:420000},
      {id:"compositor",label:"Compositor",unit:"일",defaultRate:380000}]},
  { id:"postproduction", label:"PostProduction", color:"#6B9ECC",
    roles:[
      {id:"editor",label:"Edit",unit:"일",defaultRate:300000},
      {id:"colorist",label:"Color Grading",unit:"일",defaultRate:350000},
      {id:"sound",label:"Sound (Dub, Music, SFX, Mix)",unit:"일",defaultRate:400000}]},
  { id:"overhead", label:"Overhead & Misc.", color:"#F59E0B",
    roles:[
      {id:"software_hardware",label:"Software / Hardware",unit:"식",defaultRate:0},
      {id:"render_farm",label:"Render Farm",unit:"식",defaultRate:0},
      {id:"office",label:"Office Maintenance",unit:"식",defaultRate:0},
      {id:"contingency",label:"Contingency (5%)",unit:"식",defaultRate:0,isContingency:true}]}
];
const ALL_ROLES = ROLE_CATEGORIES.flatMap(c=>c.roles.map(r=>({...r,categoryId:c.id,categoryLabel:c.label,categoryColor:c.color})));
const getRole = id => ALL_ROLES.find(r=>r.id===id);

const PHASE_ROLE_MAP = {
  pd:"pd", director:"director", supervisor:"supervisor",
  storyboard_reel:"storyboard_artist", design:"designer",
  modeling:"modeler", texture_shading:"texture_shading", rigging:"rigger",
  animation_main:"animator", lighting_render:"lighting_render",
  simulation:"simulator", fx:"fx_artist", composition:"compositor",
  edit:"editor", color_grading:"colorist", sound_post:"sound"
};

const VIDEO_TYPES = ["광고/상업 영상","유튜브/SNS 콘텐츠","Game Cinematic","모션그래픽","2D 애니메이션","3D 애니메이션"];
const formatNum = n => new Intl.NumberFormat("ko-KR").format(n);
const DAY_MS = 86400000;

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function daysBetween(a,b) { return Math.round((new Date(b)-new Date(a))/DAY_MS); }

function syncQuoteFromSchedule(schedulePhases, quoteItems) {
  // Update days for existing linked items
  const updated = quoteItems.map(item => {
    const role = getRole(item.roleId);
    if (!role || role.isContingency || item.unit !== "일") return item;
    const linkedPhaseId = Object.entries(PHASE_ROLE_MAP).find(([,rid])=>rid===item.roleId)?.[0];
    if (!linkedPhaseId) return item;
    const phase = schedulePhases.find(p=>p.phaseId===linkedPhaseId);
    if (!phase?.startDate || !phase?.endDate) return item;
    const days = daysBetween(phase.startDate, phase.endDate);
    return days > 0 ? {...item, days} : item;
  });
  // Auto-add quote items for newly added phases
  const newItems = [];
  schedulePhases.forEach(phase => {
    const roleId = PHASE_ROLE_MAP[phase.phaseId];
    if (!roleId) return;
    if (updated.find(i=>i.roleId===roleId)) return;
    const role = getRole(roleId);
    if (!role) return;
    const days = phase.startDate && phase.endDate ? Math.max(1, daysBetween(phase.startDate, phase.endDate)) : 1;
    newItems.push({
      id: Date.now() + newItems.length,
      roleId: role.id, label: role.label,
      headcount: 1, days, utilization: 100,
      rate: role.defaultRate, unit: role.unit, categoryId: role.categoryId
    });
  });
  return [...updated, ...newItems];
}

function downloadPDF(project, schedule, quote) {
  const win = window.open("","_blank");
  if (!win) { alert("팝업 차단을 해제하세요."); return; }

  const calcLine = item => {
    const role = getRole(item.roleId);
    if (role?.isContingency) return 0;
    if (item.unit!=="일") return Number(item.headcount||1)*Number(item.days||item.qty||1)*Number(item.rate||0);
    return Number(item.headcount||1)*Number(item.days||item.qty||1)*(Number(item.utilization??100)/100)*Number(item.rate||0);
  };
  const prodSub = quote.items.filter(i=>!getRole(i.roleId)?.isContingency).reduce((acc,i)=>acc+calcLine(i),0);
  const sub = quote.items.reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
  const disc = sub*(Number(quote.discountPct)/100);
  const afterDisc = sub-disc;
  const vat = afterDisc*(quote.includeVat?0.1:0);
  const total = afterDisc+vat;
  const fmt = n => new Intl.NumberFormat("ko-KR").format(Math.round(n));
  const today = new Date().toLocaleDateString("ko-KR");

  /* ── 간트 SVG (바 형태 개선) ── */
  const ganttHTML = (() => {
    const withDates = schedule.phases.filter(p=>p.startDate&&p.endDate);
    if (withDates.length === 0) return "";

    const gStart = Math.min(...withDates.map(p=>new Date(p.startDate).getTime()));
    const gEnd   = Math.max(...withDates.map(p=>new Date(p.endDate).getTime()));
    const totalMs = gEnd - gStart || 1;

    const months = [];
    let cur = new Date(gStart); cur.setDate(1);
    while (cur.getTime() <= gEnd) {
      months.push(new Date(cur));
      cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }

    const LABEL_W = 150, BAR_AREA = 430, ROW_H = 24, HDR_H = 22, W = LABEL_W + BAR_AREA;

    const rows = [];
    PHASE_CATEGORIES.forEach(cat=>{
      const cp = schedule.phases.filter(p=>getPhase(p.phaseId)?.categoryId===cat.id);
      if (!cp.length) return;
      rows.push({type:"cat",cat});
      cp.forEach(p=>rows.push({type:"phase",p,cat}));
    });

    const totalH = HDR_H + rows.length * ROW_H + 4;
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${totalH}" style="display:block;font-family:Arial,sans-serif;">`;
    svg += `<rect width="${W}" height="${totalH}" fill="#fff" rx="4" stroke="#E5E7EB" stroke-width="1"/>`;
    svg += `<rect x="${LABEL_W}" y="0" width="${BAR_AREA}" height="${HDR_H}" fill="#F4F5F7"/>`;
    svg += `<line x1="${LABEL_W}" y1="0" x2="${LABEL_W}" y2="${totalH}" stroke="#E5E7EB" stroke-width="1"/>`;

    months.forEach(m=>{
      const x = (LABEL_W + ((m.getTime()-gStart)/totalMs)*BAR_AREA).toFixed(1);
      if (parseFloat(x) > LABEL_W) svg += `<line x1="${x}" y1="${HDR_H}" x2="${x}" y2="${totalH}" stroke="#F0F0F0" stroke-width="1"/>`;
      const lbl = `${m.getFullYear().toString().slice(2)}/${String(m.getMonth()+1).padStart(2,"0")}`;
      svg += `<text x="${(parseFloat(x)+3).toFixed(1)}" y="${HDR_H-6}" font-size="8" fill="#6B7280" font-weight="600">${lbl}</text>`;
    });

    rows.forEach((row, ri) => {
      const y = HDR_H + ri * ROW_H;
      if (row.type==="cat") {
        svg += `<rect x="0" y="${y}" width="${W}" height="${ROW_H}" fill="${row.cat.color}20"/>`;
        svg += `<text x="8" y="${y+ROW_H-7}" font-size="9" fill="${row.cat.color}" font-weight="700">${row.cat.label.toUpperCase()}</text>`;
        svg += `<line x1="0" y1="${y+ROW_H}" x2="${W}" y2="${y+ROW_H}" stroke="#E5E7EB" stroke-width="0.5"/>`;
      } else {
        const {p} = row;
        const ph = getPhase(p.phaseId);
        svg += `<rect x="0" y="${y}" width="${W}" height="${ROW_H}" fill="${ri%2===0?"#fff":"#FAFAFA"}"/>`;
        svg += `<line x1="0" y1="${y+ROW_H}" x2="${W}" y2="${y+ROW_H}" stroke="#F3F4F6" stroke-width="0.5"/>`;
        svg += `<text x="${LABEL_W-6}" y="${y+ROW_H-8}" font-size="9" fill="#374151" text-anchor="end">${ph?.label||""}</text>`;
        if (p.startDate && p.endDate) {
          const lPct = (new Date(p.startDate).getTime()-gStart)/totalMs;
          const wPct = (new Date(p.endDate).getTime()-new Date(p.startDate).getTime())/totalMs;
          const bx = (LABEL_W + lPct*BAR_AREA).toFixed(1);
          const bw = Math.max(4, wPct*BAR_AREA).toFixed(1);
          const dur = Math.round((new Date(p.endDate)-new Date(p.startDate))/86400000);
          svg += `<rect x="${bx}" y="${y+4}" width="${bw}" height="${ROW_H-9}" rx="3" fill="${ph?.color||"#888"}" opacity="0.9"/>`;
          if (parseFloat(bw)>28) svg += `<text x="${(parseFloat(bx)+parseFloat(bw)/2).toFixed(1)}" y="${y+ROW_H-8}" font-size="7.5" fill="white" font-weight="700" text-anchor="middle">${dur}d</text>`;
          if (p.assignee && parseFloat(bw)>50) svg += `<text x="${(parseFloat(bx)+parseFloat(bw)+4).toFixed(1)}" y="${y+ROW_H-8}" font-size="7" fill="#9CA3AF">${p.assignee}</text>`;
        }
      }
    });
    svg += `</svg>`;
    return `<div class="section"><div class="section-title">Production Schedule — Gantt Chart</div><div style="overflow:hidden;border-radius:6px;border:1px solid #E5E7EB">${svg}</div></div>`;
  })();

  /* ── 스케줄 테이블 ── */
  const schedRows = schedule.phases.map(p=>{
    const ph = ALL_PHASES.find(x=>x.id===p.phaseId);
    const days = p.startDate&&p.endDate ? Math.round((new Date(p.endDate)-new Date(p.startDate))/86400000) : "-";
    return `<tr><td>${ph?.categoryLabel||""}</td><td>${ph?.label||p.phaseId}</td><td>${p.startDate||"-"}</td><td>${p.endDate||"-"}</td><td>${days!=="-"?days+"일":"-"}</td><td>${p.assignee||"-"}</td></tr>`;
  }).join("");

  /* ── 견적 테이블 ── */
  const quoteRows = quote.items.map(item=>{
    const r = getRole(item.roleId);
    const amt = r?.isContingency ? prodSub*0.05 : calcLine(item);
    const qtyStr = r?.isContingency ? "5% auto"
      : (item.unit==="일" ? `${item.headcount||1}명×${item.utilization??100}%×${item.days||item.qty||1}일` : `${item.headcount||1}×${item.days||item.qty||1}${item.unit}`);
    return `<tr><td>${r?.categoryLabel||""}</td><td>${item.label}</td><td>${qtyStr}</td><td>${r?.isContingency?"-":"₩"+fmt(item.rate)}</td><td>₩${fmt(amt)}</td></tr>`;
  }).join("");

  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${project.name||"견적서"} - LOCUS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;color:#111;background:#fff;padding:40px;font-size:13px}
.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #C8102E;padding-bottom:20px;margin-bottom:28px}
.doc-title h1{font-size:22px;font-weight:900;color:#C8102E}
.doc-title .meta{font-size:11px;color:#666;margin-top:4px}
.company{font-size:11px;color:#666;margin-top:4px}
.section{margin-bottom:28px}
.section-title{font-size:13px;font-weight:700;color:#C8102E;text-transform:uppercase;letter-spacing:.08em;border-left:3px solid #C8102E;padding-left:8px;margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
.info-row{display:flex;gap:8px;font-size:12px}
.info-label{color:#888;min-width:80px}
.info-value{font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a2e;color:#fff;padding:8px 10px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
td{padding:7px 10px;border-bottom:1px solid #eee}
tr:nth-child(even) td{background:#f9f9f9}
.totals{margin-left:auto;width:280px}
.total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #eee}
.total-final{display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:900;color:#C8102E;border-top:2px solid #C8102E;margin-top:4px}
.footer{margin-top:40px;border-top:1px solid #eee;padding-top:16px;font-size:11px;color:#aaa;display:flex;justify-content:space-between}
@media print{body{padding:20px}@page{size:A4;margin:15mm}}
</style></head><body>
<div class="header">
  <div><div style="font-size:18px;font-weight:900;color:#C8102E">LOCUS</div><div class="company">Animation Studio — Schedule &amp; Quote</div></div>
  <div class="doc-title"><h1>${project.name||"프로젝트명 미입력"}</h1>
  <div class="meta">Client: ${project.client||"-"} &nbsp;|&nbsp; Date: ${today}</div></div>
</div>
<div class="section"><div class="section-title">Project Overview</div>
<div class="info-grid">${[["Project",project.name],["Client",project.client],["PD",project.manager],["Type",project.videoType],["Duration",project.duration?project.duration+"초":"-"],["FPS",project.fps?project.fps+" fps":"-"],["Resolution",project.resolution],["Format",project.format],["Revisions",project.revisions?project.revisions+"회":"-"],["Deadline",project.deadline||"-"]].map(([k,v])=>`<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v||"-"}</span></div>`).join("")}
</div></div>
${ganttHTML}
${schedule.phases.length>0?`<div class="section"><div class="section-title">Schedule Details</div><table><thead><tr><th>Category</th><th>Phase</th><th>Start</th><th>End</th><th>Days</th><th>Assignee</th></tr></thead><tbody>${schedRows}</tbody></table></div>`:""}
${quote.items.length>0?`<div class="section"><div class="section-title">Cost Breakdown</div>
<p style="font-size:10px;color:#888;margin-bottom:8px">소계 = 인원 × 투입률 × 일수 × 단가</p>
<table><thead><tr><th>Category</th><th>Item</th><th>인원×투입률×일수</th><th>Unit Rate</th><th>Amount</th></tr></thead><tbody>${quoteRows}</tbody></table>
<div style="margin-top:20px"><div class="totals">
<div class="total-row"><span>Subtotal</span><span>₩${fmt(sub)}</span></div>
${Number(quote.discountPct)>0?`<div class="total-row"><span>Discount (${quote.discountPct}%)</span><span>-₩${fmt(disc)}</span></div>`:""}
${quote.includeVat?`<div class="total-row"><span>VAT (10%)</span><span>₩${fmt(vat)}</span></div>`:""}
<div class="total-final"><span>TOTAL</span><span>₩${fmt(total)}</span></div>
</div></div></div>`:""}
<div class="footer"><span>LOCUS Animation Studio &copy; ${new Date().getFullYear()}</span><span>Generated on ${today}</span></div>
<script>window.onload=()=>{window.print();}<\/script>
</body></html>`);
  win.document.close();
}

/* ── 데이터 ───────────────────────────────────────────────────────────── */

/* ── 공통 UI ─────────────────────────────────────────────────────────── */
function Tag({children, color, onRemove}) {
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 10px",borderRadius:99,background:color+"22",border:`1px solid ${color}55`,color,fontSize:12,fontWeight:600}}>
      {children}
      {onRemove && <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color,lineHeight:1,padding:0,fontSize:13}}>×</button>}
    </span>
  );
}
function Card({children, style={}}) {
  return <div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:16,padding:"24px 28px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",...style}}>{children}</div>;
}
function FInput({label, style:extStyle, ...props}) {
  return (
    <label style={{display:"flex",flexDirection:"column",gap:6}}>
      {label && <span style={{fontSize:12,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>}
      <input {...props} style={{background:"#F8F9FA",border:"1px solid #E5E7EB",borderRadius:10,padding:"10px 14px",color:"#1A1A2E",fontSize:14,outline:"none",transition:"border-color 0.2s",...extStyle}}
        onFocus={e=>e.target.style.borderColor="#C8102E"} onBlur={e=>e.target.style.borderColor="#E5E7EB"} />
    </label>
  );
}
function FSelect({label, children, style:extStyle, ...props}) {
  return (
    <label style={{display:"flex",flexDirection:"column",gap:6}}>
      {label && <span style={{fontSize:12,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>}
      <select {...props} style={{background:"#F8F9FA",border:"1px solid #E5E7EB",borderRadius:10,padding:"10px 14px",color:"#1A1A2E",fontSize:14,outline:"none",cursor:"pointer",...extStyle}}>
        {children}
      </select>
    </label>
  );
}
function ProjectInfoTab({project, onChange}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <Card>
        <h3 style={{margin:"0 0 18px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>📁 프로젝트 정보</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <FInput label="프로젝트명" value={project.name} onChange={e=>onChange("name",e.target.value)} placeholder="예: OO브랜드 론칭 영상" style={{gridColumn:"1 / -1"}} />
          <FInput label="클라이언트" value={project.client} onChange={e=>onChange("client",e.target.value)} placeholder="클라이언트명" />
          <FInput label="담당 PD" value={project.manager} onChange={e=>onChange("manager",e.target.value)} placeholder="담당자 이름" />
          <FInput label="의뢰일" type="date" value={project.startDate} onChange={e=>onChange("startDate",e.target.value)} />
          <FInput label="납품 기한" type="date" value={project.deadline} onChange={e=>onChange("deadline",e.target.value)} />
          <FSelect label="영상 유형" value={project.videoType} onChange={e=>onChange("videoType",e.target.value)} style={{gridColumn:"1 / -1"}}>
            <option value="">선택하세요</option>
            {VIDEO_TYPES.map(t=><option key={t} value={t}>{t}</option>)}

/* ── 간트 차트 ────────────────────────────────────────────────────────── */
function GanttChart({phases, ganttStart, ganttEnd, onUpdate}) {
  const containerRef = useRef(null);
  const dragRef = useRef(null);
  const totalDays = daysBetween(ganttStart, ganttEnd) || 1;

  const months = [];
  let cur = new Date(ganttStart);
  const end = new Date(ganttEnd);
  while (cur <= end) {
    months.push(new Date(cur));
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const handleMouseDown = (e, phaseId, type) => {
    e.preventDefault();
    const container = containerRef.current;
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const startX = e.clientX;
    const phase = phases.find(p=>p.id===phaseId);
    const origStart = phase.startDate;
    const origEnd   = phase.endDate;
    dragRef.current = {phaseId,type,startX,origStart,origEnd,containerWidth:rect.width,totalDays};

    const onMove = ev => {
      const {phaseId,type,startX,origStart,origEnd,containerWidth} = dragRef.current;
      const daysDelta = Math.round(((ev.clientX-startX)/containerWidth)*totalDays);
      if (type==="move") {
        const dur = daysBetween(origStart,origEnd);
        let ns = addDays(origStart,daysDelta);
        if (addDays(ns,dur) > ganttEnd) ns = addDays(ganttEnd,-dur);
        if (ns < ganttStart) ns = ganttStart;
        onUpdate(phaseId, ns, addDays(ns,dur));
      } else if (type==="resize-right") {
        let ne = addDays(origEnd,daysDelta);
        if (ne > ganttEnd) ne = ganttEnd;
        if (ne > origStart) onUpdate(phaseId,origStart,ne);
      } else if (type==="resize-left") {
        let ns = addDays(origStart,daysDelta);
        if (ns < ganttStart) ns = ganttStart;
        if (ns < origEnd) onUpdate(phaseId,ns,origEnd);
      }
    };
    const onUp = () => { dragRef.current=null; window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  };

  const rows = [];
  PHASE_CATEGORIES.forEach(cat => {
    const catPhases = phases.filter(p=>getPhase(p.phaseId)?.categoryId===cat.id);
    if (catPhases.length===0) return;
    rows.push({type:"category",cat});
    catPhases.forEach(p=>rows.push({type:"phase",p,cat}));
  });
  if (rows.length===0) return null;

  const ROW_H=36, LABEL_W=160;

  return (
    <div ref={containerRef} style={{overflowX:"auto",borderRadius:12,background:"#EAEDF0",border:"1px solid #E5E7EB"}}>
      <div style={{minWidth:700}}>
        {/* Month header */}
        <div style={{display:"flex",borderBottom:"1px solid #E5E7EB"}}>
          <div style={{width:LABEL_W,flexShrink:0,padding:"6px 12px"}} />
          <div style={{flex:1,position:"relative",height:42}}>
            {months.map((m,i)=>{
              const left = Math.max(0,(daysBetween(ganttStart,m.toISOString().slice(0,10))/totalDays)*100);
              const pctPerMonth = 100/totalDays*30;
              if (pctPerMonth < 2 && m.getMonth()%3!==0) return null;
              if (pctPerMonth < 1 && m.getMonth()%6!==0) return null;
              return (
                <div key={i} style={{position:"absolute",left:`${left}%`,top:4,paddingLeft:4,borderLeft:"1px solid #D1D5DB"}}>
                  <div style={{fontSize:9,color:"#374151",fontWeight:700,lineHeight:1.4,whiteSpace:"nowrap"}}>{m.getFullYear()}</div>
                  <div style={{fontSize:9,color:"#6B7280",fontWeight:600,lineHeight:1.4,whiteSpace:"nowrap"}}>{String(m.getMonth()+1).padStart(2,"0")}월</div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Rows */}
        {rows.map((row,ri)=>{
          if (row.type==="category") return (
            <div key={`cat-${row.cat.id}`} style={{display:"flex",alignItems:"center",height:26,background:`${row.cat.color}18`,borderBottom:"1px solid #EEEFF2"}}>
              <div style={{width:LABEL_W,flexShrink:0,padding:"0 12px",fontSize:10,fontWeight:800,color:row.cat.color,textTransform:"uppercase",letterSpacing:"0.1em"}}>{row.cat.label}</div>
              <div style={{flex:1}} />
            </div>
          );
          const {p,cat} = row;
          const phase = getPhase(p.phaseId);
          if (!p.startDate || !p.endDate) return (
            <div key={p.id} style={{display:"flex",alignItems:"center",height:ROW_H,borderBottom:"1px solid #F3F4F6"}}>
              <div style={{width:LABEL_W,flexShrink:0,padding:"0 12px 0 20px",fontSize:12,color:"#6B7280"}}>{phase?.label}</div>
              <div style={{flex:1,padding:"0 8px"}}><span style={{fontSize:11,color:"#9CA3AF"}}>— 날짜 미설정</span></div>
            </div>
          );
          const leftPct  = Math.max(0,(daysBetween(ganttStart,p.startDate)/totalDays)*100);
          const widthPct = Math.max(0.5,(daysBetween(p.startDate,p.endDate)/totalDays)*100);
          const dur = daysBetween(p.startDate,p.endDate);
          return (
            <div key={p.id} style={{display:"flex",alignItems:"center",height:ROW_H,borderBottom:"1px solid #F3F4F6",position:"relative"}}>
              <div style={{width:LABEL_W,flexShrink:0,padding:"0 8px 0 20px",fontSize:12,color:"#374151",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{phase?.label}</div>
              <div style={{flex:1,position:"relative",height:"100%"}}>
                {months.map((m,i)=>{
                  const l2 = Math.max(0,(daysBetween(ganttStart,m.toISOString().slice(0,10))/totalDays)*100);
                  return <div key={i} style={{position:"absolute",left:`${l2}%`,top:0,bottom:0,width:1,background:"#E5E7EB"}} />;
                })}
                <div onMouseDown={e=>handleMouseDown(e,p.id,"move")} style={{position:"absolute",left:`${leftPct}%`,width:`${widthPct}%`,top:"50%",transform:"translateY(-50%)",height:22,borderRadius:6,background:`linear-gradient(90deg,${phase?.color||"#888"},${phase?.color||"#888"}bb)`,cursor:"grab",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"rgba(0,0,0,0.75)",fontWeight:700,userSelect:"none",minWidth:4,boxShadow:`0 2px 8px ${phase?.color||"#888"}44`,overflow:"hidden"}} title={`${p.startDate} ~ ${p.endDate} (${dur}일)`}>
                  <div onMouseDown={e=>{e.stopPropagation();handleMouseDown(e,p.id,"resize-left");}} style={{position:"absolute",left:0,top:0,bottom:0,width:8,cursor:"ew-resize",background:"rgba(0,0,0,0.15)",borderRadius:"6px 0 0 6px"}} />
                  {widthPct>6 && <span style={{pointerEvents:"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",padding:"0 12px"}}>{dur}d</span>}
                  <div onMouseDown={e=>{e.stopPropagation();handleMouseDown(e,p.id,"resize-right");}} style={{position:"absolute",right:0,top:0,bottom:0,width:8,cursor:"ew-resize",background:"rgba(0,0,0,0.15)",borderRadius:"0 6px 6px 0"}} />
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── 견적 탭 ──────────────────────────────────────────────────────────── */
function QuoteTab({quote, onChange, userCanEditRate}) {
  const addItem = roleId => {
    const role = getRole(roleId);
    if (!role) return;
    onChange("items", [...quote.items, {
      id:Date.now(), roleId:role.id, label:role.label,
      headcount:1, days:1, utilization:100, rate:role.defaultRate,
      unit:role.unit, categoryId:role.categoryId
    }]);
  };
  const updateItem = (id,field,value) => {
    onChange("items", quote.items.map(item=>{
      if (item.id!==id) return item;
      if (field==="roleId") {
        const r=getRole(value);
        return {...item,roleId:value,label:r?.label||item.label,unit:r?.unit||item.unit,rate:r?.defaultRate??item.rate,categoryId:r?.categoryId||item.categoryId};
      }
      return {...item,[field]:value};
    }));
  };
  const removeItem = id => onChange("items", quote.items.filter(i=>i.id!==id));

  // lineTotal = headcount × days × (utilization/100) × rate
  const calcLine = item => {
    const role = getRole(item.roleId);
    if (role?.isContingency) return 0;
    if (item.unit!=="일") return Number(item.headcount||1)*Number(item.days||1)*Number(item.rate||0);
    return Number(item.headcount||1)*Number(item.days||1)*(Number(item.utilization??100)/100)*Number(item.rate||0);
  };

  const prodSub = quote.items.filter(i=>!getRole(i.roleId)?.isContingency).reduce((acc,i)=>acc+calcLine(i),0);
  const sub = quote.items.reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
  const disc = sub*(Number(quote.discountPct)/100);
  const afterDisc = sub-disc;
  const vat = afterDisc*(quote.includeVat?0.1:0);
  const total = afterDisc+vat;
  const inS = {background:"#F8F9FA",border:"1px solid #E5E7EB",borderRadius:7,padding:"5px 6px",color:"#1A1A2E",fontSize:11,outline:"none",textAlign:"center",width:"100%"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {ROLE_CATEGORIES.map(cat=>{
        const catItems = quote.items.filter(i=>i.categoryId===cat.id);
        const catSub   = catItems.reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
        const addable  = cat.roles.filter(r=>!quote.items.find(i=>i.roleId===r.id));
        return (
          <Card key={cat.id} style={{borderColor:`${cat.color}33`,padding:"18px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:4,height:16,borderRadius:2,background:cat.color}} />
                <span style={{fontSize:13,fontWeight:800,color:cat.color,letterSpacing:"0.05em"}}>{cat.label}</span>
                {catSub>0 && <span style={{fontSize:11,color:"#6B7280"}}>₩{formatNum(Math.round(catSub))}</span>}
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                {addable.map(r=>(
                  <button key={r.id} onClick={()=>addItem(r.id)} style={{background:`${cat.color}18`,border:`1px solid ${cat.color}44`,borderRadius:6,padding:"3px 9px",color:cat.color,fontSize:10,fontWeight:700,cursor:"pointer"}}>+ {r.label}</button>
                ))}
              </div>
            </div>

            {catItems.length===0
              ? <div style={{fontSize:12,color:"#6B7280",padding:"4px 0"}}>위 버튼으로 항목을 추가하세요</div>
              : (
                <>
                  {/* 헤더 */}
                  <div style={{display:"grid",gridTemplateColumns:"1.8fr 55px 55px 55px 90px 80px 28px",gap:5,marginBottom:5,padding:"0 2px"}}>
                    {["항목","인원","투입률(%)","일수","단가(₩/일)","소계",""].map((h,i)=>(
                      <span key={i} style={{fontSize:9,color:"#9CA3AF",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",textAlign:i>0&&i<6?"center":"left"}}>{h}</span>
                    ))}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {catItems.map(item=>{
                      const role = getRole(item.roleId);
                      const isC  = role?.isContingency;
                      const lineTotal = isC ? prodSub*0.05 : calcLine(item);
                      const linked = Object.entries(PHASE_ROLE_MAP).find(([,rid])=>rid===item.roleId)?.[0];
                      return (
                        <div key={item.id} style={{display:"grid",gridTemplateColumns:"1.8fr 55px 55px 55px 90px 80px 28px",gap:5,alignItems:"center",padding:"7px 8px",borderRadius:8,background:`${cat.color}0a`,border:`1px solid ${cat.color}18`}}>
                          {/* 항목명 */}
                          <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                            <div style={{width:5,height:5,borderRadius:1,background:cat.color,flexShrink:0}} />
                            <input value={item.label} onChange={e=>updateItem(item.id,"label",e.target.value)}
                              style={{...inS,textAlign:"left",flex:1,minWidth:0}} />
                            {linked && <span title="스케줄 연동" style={{fontSize:8,color:"#059669",border:"1px solid #05966944",borderRadius:3,padding:"1px 4px",whiteSpace:"nowrap",flexShrink:0}}>⟳</span>}
                          </div>
                          {isC ? (
                            <><div style={{fontSize:10,color:"#9CA3AF",textAlign:"center",gridColumn:"span 3"}}>— 자동 5% —</div></>
                          ) : (
                            <>
                              {/* 인원 */}
                              <input type="number" min="1" value={item.headcount??1} onChange={e=>updateItem(item.id,"headcount",e.target.value)} style={inS} />
                              {/* 투입률 */}
                              <input type="number" min="1" max="100" value={item.utilization??100} onChange={e=>updateItem(item.id,"utilization",e.target.value)} style={inS} />
                              {/* 일수 */}
                              <input type="number" min="1" value={item.days??item.qty??1} onChange={e=>updateItem(item.id,"days",e.target.value)} style={inS} />
                              {/* 단가 */}
                              <input type="number" value={item.rate} onChange={e=>updateItem(item.id,"rate",e.target.value)}
                                disabled={!userCanEditRate}
                                style={{...inS,textAlign:"right",opacity:userCanEditRate?1:0.5,cursor:userCanEditRate?"text":"not-allowed"}} />
                            </>
                          )}
                          {/* 소계 */}
                          <div style={{fontSize:11,fontWeight:700,color:"#1A1A2E",textAlign:"right"}}>₩{formatNum(Math.round(lineTotal))}</div>
                          <button onClick={()=>removeItem(item.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"4px 7px",color:"#EF4444",cursor:"pointer",fontSize:11}}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                  {/* 공식 안내 */}
                  <div style={{marginTop:8,fontSize:10,color:"#9CA3AF",textAlign:"right"}}>
                    소계 = 인원 × 투입률(%) ÷ 100 × 일수 × 단가
                  </div>
                </>
              )}
          </Card>
        );
      })}

      <Card>
        <h3 style={{margin:"0 0 16px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>🧮 견적 합계</h3>
        {quote.items.length>0 && sub>0 && (
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",height:8,borderRadius:99,overflow:"hidden",gap:1,marginBottom:10}}>
              {ROLE_CATEGORIES.map(cat=>{
                const amt = quote.items.filter(i=>i.categoryId===cat.id).reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
                const pct = (amt/sub)*100;
                if (pct===0) return null;
                return <div key={cat.id} style={{width:`${pct}%`,background:cat.color,minWidth:2}} title={`${cat.label}: ${pct.toFixed(1)}%`} />;
              })}
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {ROLE_CATEGORIES.map(cat=>{
                const amt = quote.items.filter(i=>i.categoryId===cat.id).reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
                if (amt===0) return null;
                return (
                  <div key={cat.id} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:8,height:8,borderRadius:2,background:cat.color}} />
                    <span style={{fontSize:11,color:"#6B7280"}}>{cat.label}</span>
                    <span style={{fontSize:11,color:"#1A1A2E",fontWeight:600}}>₩{formatNum(Math.round(amt))}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
          <FInput label="할인율 (%)" type="number" value={quote.discountPct} onChange={e=>onChange("discountPct",e.target.value)} placeholder="0" />
          <label style={{display:"flex",alignItems:"center",gap:10,paddingTop:24}}>
            <input type="checkbox" checked={quote.includeVat} onChange={e=>onChange("includeVat",e.target.checked)} style={{width:18,height:18,accentColor:"#C8102E",cursor:"pointer"}} />
            <span style={{color:"#1A1A2E",fontSize:14}}>부가세 (10%) 포함</span>
          </label>
        </div>
        <div style={{borderTop:"1px solid #E5E7EB",paddingTop:16}}>
          {[
            {label:"소계",value:sub,dimmed:false},
            Number(quote.discountPct)>0&&{label:`할인 (${quote.discountPct}%)`,value:-disc,dimmed:true},
            quote.includeVat&&{label:"부가세 (10%)",value:vat,dimmed:true}
          ].filter(Boolean).map((row,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:10,color:row.dimmed?"#9CA3AF":"#1A1A2E"}}>
              <span style={{fontSize:14}}>{row.label}</span>
              <span style={{fontSize:14,fontWeight:600}}>{row.value<0?"-":""}₩{formatNum(Math.abs(Math.round(row.value)))}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,borderTop:"1px solid #D1D5DB",marginTop:4}}>
            <span style={{fontSize:18,fontWeight:800,color:"#C8102E"}}>총 견적금액</span>
            <span style={{fontSize:22,fontWeight:900,color:"#C8102E"}}>₩{formatNum(Math.round(total))}</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

/* ── 기준표 탭 ────────────────────────────────────────────────────────── */

  const updateAsset = (id,val) => onChange({...standards, asset: standards.asset.map(s=>s.id===id?{...s,days:Number(val)}:s)});
  const updateProd  = (id,val) => onChange({...standards, production: standards.production.map(s=>s.id===id?{...s,spw:Number(val)}:s)});

  const assetCats = ["모델링","룩댑","리깅"];
  const prodCats  = ["애니메이션","라이팅&렌더","FX","합성"];
  const qColor    = {S:"#C8102E",A:"#F59E0B",B:"#34D399"};
  const inS = {background:"#F8F9FA",border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 8px",color:"#1A1A2E",fontSize:12,outline:"none",textAlign:"right",width:70};
  const th = {padding:"8px 12px",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.05em",borderBottom:"2px solid #E5E7EB",background:"#F4F5F7",whiteSpace:"nowrap"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <Card>
        <h3 style={{margin:"0 0 4px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>📋 에셋 제작 기준</h3>
        <p style={{fontSize:11,color:"#9CA3AF",marginBottom:16}}>모델링·룩댑·리깅 — 에셋 1종당 작업 기간(일). 값을 직접 수정할 수 있습니다.</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
          {assetCats.map(cat=>{
            const rows = standards.asset.filter(s=>s.cat===cat);
            return (
              <div key={cat}>
                <div style={{fontSize:12,fontWeight:800,color:"#374151",marginBottom:8,paddingBottom:4,borderBottom:"2px solid #E5E7EB"}}>{cat}</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>
                      {["분량","등급",cat==="룩댑"?"해상도":"","기간(일)"].filter(Boolean).map((h,i)=>(
                        <th key={i} style={{...th,textAlign:i>0?"center":"left",padding:"6px 8px"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((s,ri)=>(
                      <tr key={s.id} style={{background:ri%2===0?"#fff":"#FAFAFA"}}>
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",color:"#374151",fontSize:11}}>{s.item}</td>
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"center"}}>
                          <span style={{background:qColor[s.q]+"22",color:qColor[s.q],fontWeight:700,padding:"1px 6px",borderRadius:4,fontSize:11}}>{s.q}</span>
                        </td>
                        {cat==="룩댑" && <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"center",fontSize:11,color:"#6B7280"}}>{s.res}</td>}
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"right"}}>
                          <input type="number" min="1" value={s.days} onChange={e=>updateAsset(s.id,e.target.value)} style={inS} />
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      </Card>

      <Card>
        <h3 style={{margin:"0 0 4px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>📋 프레임 작업 기준</h3>
        <p style={{fontSize:11,color:"#9CA3AF",marginBottom:16}}>애니메이션·라이팅&렌더·FX·합성 — 1인이 1주일에 처리 가능한 초(秒). 값을 직접 수정할 수 있습니다.</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
          {prodCats.map(cat=>{
            const rows = standards.production.filter(s=>s.cat===cat);
            const hasRes = rows.some(s=>s.res);
            return (
              <div key={cat}>
                <div style={{fontSize:12,fontWeight:800,color:"#374151",marginBottom:8,paddingBottom:4,borderBottom:"2px solid #E5E7EB"}}>{cat}</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>
                      {["등급",hasRes?"해상도":"","FPS","초/주(1인)"].filter(Boolean).map((h,i)=>(
                        <th key={i} style={{...th,textAlign:i>0?"center":"left",padding:"6px 8px"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((s,ri)=>(
                      <tr key={s.id} style={{background:ri%2===0?"#fff":"#FAFAFA"}}>
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"center"}}>
                          <span style={{background:qColor[s.q]+"22",color:qColor[s.q],fontWeight:700,padding:"1px 6px",borderRadius:4,fontSize:11}}>{s.q}</span>
                        </td>
                        {hasRes && <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"center",fontSize:11,color:"#6B7280"}}>{s.res||"-"}</td>}
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"center",fontSize:11,color:"#6B7280"}}>{s.fps} fps</td>
                        <td style={{padding:"5px 8px",borderBottom:"1px solid #F3F4F6",textAlign:"right"}}>
                          <input type="number" min="0.1" step="0.1" value={s.spw} onChange={e=>updateProd(s.id,e.target.value)} style={inS} />
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

/* ── 요약 탭 ──────────────────────────────────────────────────────────── */
function SummaryTab({project, schedule, quote}) {
  const calcLine = item => {
    const role = getRole(item.roleId);
    if (role?.isContingency) return 0;
    if (item.unit!=="일") return Number(item.headcount||1)*Number(item.days||item.qty||1)*Number(item.rate||0);
    return Number(item.headcount||1)*Number(item.days||item.qty||1)*(Number(item.utilization??100)/100)*Number(item.rate||0);
  };
  const prodSub = quote.items.filter(i=>!getRole(i.roleId)?.isContingency).reduce((acc,i)=>acc+calcLine(i),0);
  const sub = quote.items.reduce((acc,i)=>{ const r=getRole(i.roleId); return acc+(r?.isContingency?prodSub*0.05:calcLine(i)); },0);
  const disc = sub*(Number(quote.discountPct)/100);
  const afterDisc = sub-disc;
  const vat = afterDisc*(quote.includeVat?0.1:0);
  const grandTotal = afterDisc+vat;

  const firstPhase = schedule.phases.filter(p=>p.startDate).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate))[0];
  const lastPhase  = schedule.phases.filter(p=>p.endDate).sort((a,b)=>new Date(b.endDate)-new Date(a.endDate))[0];
  const totalDays  = firstPhase&&lastPhase ? daysBetween(firstPhase.startDate, lastPhase.endDate) : null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
        {[
          {label:"총 견적금액",value:`₩${formatNum(Math.round(grandTotal))}`,sub:"부가세 포함",color:"#C8102E"},
          {label:"총 제작 기간",value:totalDays?`${totalDays}일`:"-",sub:firstPhase?`${firstPhase.startDate} ~ ${lastPhase?.endDate}`:"일정 미입력",color:"#6B9ECC"},
          {label:"납품 기한",value:project.deadline||"-",sub:project.videoType||"유형 미설정",color:"#34D399"}
        ].map((kpi,i)=>(
          <div key={i} style={{background:`${kpi.color}11`,border:`1px solid ${kpi.color}33`,borderRadius:16,padding:"20px 22px"}}>
            <div style={{fontSize:12,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>{kpi.label}</div>
            <div style={{fontSize:24,fontWeight:900,color:kpi.color,marginBottom:4}}>{kpi.value}</div>
            <div style={{fontSize:12,color:"#6B7280"}}>{kpi.sub}</div>
          </div>
        ))}
      </div>

      <Card>
        <h3 style={{margin:"0 0 16px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>📋 프로젝트 개요</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["프로젝트명",project.name||"-"],["클라이언트",project.client||"-"],["담당 PD",project.manager||"-"],["영상 유형",project.videoType||"-"],["영상 길이",project.duration?`${project.duration}초`:"-"],["FPS",project.fps?`${project.fps} fps`:"-"],["해상도",project.resolution||"-"],["수정 횟수",project.revisions?`${project.revisions}회`:"-"],["납품 포맷",project.format||"-"]].map(([k,v],i)=>(
            <div key={i} style={{display:"flex",gap:10}}>
              <span style={{fontSize:13,color:"#6B7280",minWidth:80}}>{k}</span>
              <span style={{fontSize:13,color:"#1A1A2E",fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      </Card>

      {schedule.phases.length>0 && (
        <Card>
          <h3 style={{margin:"0 0 16px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>📅 일정 요약</h3>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#F4F5F7"}}>
                  {["단계","시작일","종료일","기간","담당자"].map((h,i)=>(
                    <th key={i} style={{padding:"8px 12px",textAlign:i===0?"left":"center",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"2px solid #E5E7EB",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {schedule.phases.map((p,ri)=>{
                  const phase = getPhase(p.phaseId);
                  const days  = p.startDate&&p.endDate ? daysBetween(p.startDate,p.endDate) : null;
                  return (
                    <tr key={p.id} style={{background:ri%2===0?"#fff":"#FAFAFA"}}>
                      <td style={{padding:"9px 12px",borderBottom:"1px solid #F3F4F6"}}>
                        <Tag color={phase?.color||"#888"}>{phase?.label}</Tag>
                      </td>
                      <td style={{padding:"9px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"center",color:"#374151"}}>{p.startDate||"-"}</td>
                      <td style={{padding:"9px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"center",color:"#374151"}}>{p.endDate||"-"}</td>
                      <td style={{padding:"9px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"center",color:"#6B7280",fontWeight:600}}>{days!==null?`${days}일`:"-"}</td>
                      <td style={{padding:"9px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"center",color:"#6B9ECC"}}>{p.assignee||"-"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {quote.items.length>0 && (
        <Card>
          <h3 style={{margin:"0 0 16px",color:"#C8102E",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>💰 견적 요약</h3>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#F4F5F7"}}>
                  {["항목","인원 × 투입률 × 일수","단가","금액"].map((h,i)=>(
                    <th key={i} style={{padding:"8px 12px",textAlign:i===0?"left":"right",fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"2px solid #E5E7EB",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {ROLE_CATEGORIES.map(cat=>{
                  const catItems = quote.items.filter(i=>i.categoryId===cat.id);
                  if (catItems.length===0) return null;
                  return [
                    <tr key={`cat-${cat.id}`}>
                      <td colSpan={4} style={{padding:"10px 12px 4px",fontSize:11,fontWeight:700,color:cat.color,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:`1px solid ${cat.color}33`}}>{cat.label}</td>
                    </tr>,
                    ...catItems.map((item,ri)=>{
                      const r   = getRole(item.roleId);
                      const amt = r?.isContingency ? prodSub*0.05 : calcLine(item);
                      const detail = r?.isContingency ? "5% 자동"
                        : (item.unit==="일" ? `${item.headcount||1}명 × ${item.utilization??100}% × ${item.days||item.qty||1}일` : `${item.headcount||1}명 × ${item.days||item.qty||1}${item.unit}`);
                      return (
                        <tr key={item.id} style={{background:ri%2===0?"#fff":"#FAFAFA"}}>
                          <td style={{padding:"8px 12px",borderBottom:"1px solid #F3F4F6",color:"#1A1A2E",fontWeight:600}}>{item.label}</td>
                          <td style={{padding:"8px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"right",color:"#6B7280",fontSize:12,whiteSpace:"nowrap"}}>{detail}</td>
                          <td style={{padding:"8px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"right",color:"#6B7280",whiteSpace:"nowrap"}}>{r?.isContingency?"-":`₩${formatNum(item.rate)}`}</td>
                          <td style={{padding:"8px 12px",borderBottom:"1px solid #F3F4F6",textAlign:"right",color:"#1A1A2E",fontWeight:700,whiteSpace:"nowrap"}}>₩{formatNum(Math.round(amt))}</td>
                        </tr>
                      );
                    })
                  ];
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid #C8102E"}}>

                  <td style={{padding:"12px",textAlign:"right",fontSize:20,fontWeight:900,color:"#C8102E",whiteSpace:"nowrap"}}>₩{formatNum(Math.round(grandTotal))}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </Card>
      )}
    </div>
  );
}

/* ── 자동 스케줄 계산 ───────────────────────────────────────────────────── */
function calcAutoSchedule(project, standards, projectStartDate) {
  const q   = project.qualityGrade || "A";
  const fps = Number(project.fps) || 24;
  const res = (project.resolution||"").includes("3840") ? "4K" : "FHD";
  const totalSecs = Number(project.duration) || 0;
  const chars = Number(project.charCount) || 0;
  const props = Number(project.propCount) || 0;
  const bgs   = Number(project.bgCount)   || 0;
  const start = projectStartDate || new Date().toISOString().slice(0,10);

  const assetDays = (cat, item, qual, resolution) =>
    (standards.asset.find(s=>s.cat===cat&&s.item===item&&s.q===qual&&(!resolution||s.res===resolution))?.days) || 0;
  const prodSpw = (cat, qual, fpsVal, resolution) =>
    (standards.production.find(s=>s.cat===cat&&s.q===qual&&s.fps===fpsVal&&(!resolution||s.res===resolution))?.spw) || 1;

  const modelTotal  = chars*assetDays("모델링","캐릭터 1종",q)+props*assetDays("모델링","프랍 1종",q)+bgs*assetDays("모델링","배경 1종",q);
  const lookDevTotal= chars*assetDays("룩댑","캐릭터 1종",q,res)+bgs*assetDays("룩댑","배경 1종",q,res);
  const riggingTotal= chars*assetDays("리깅","캐릭터 1종",q)+props*assetDays("리깅","프랍 1종",q);

  const animDays  = totalSecs>0 ? Math.ceil((totalSecs/prodSpw("애니메이션",q,fps))*7) : 0;
  const lrDays    = totalSecs>0 ? Math.ceil((totalSecs/prodSpw("라이팅&렌더",q,fps,res))*7) : 0;
  const fxDays    = totalSecs>0 ? Math.ceil((totalSecs/prodSpw("FX",q,fps))*7) : 0;
  const compDays  = totalSecs>0 ? Math.ceil((totalSecs/prodSpw("합성",q,fps,res))*7) : 0;

  const headOf = (total, stdDays) => Math.max(1, Math.ceil(total / Math.max(stdDays,1)));
  const modelHC  = headOf(modelTotal, 60);
  const lookHC   = headOf(lookDevTotal, 60);
  const rigHC    = headOf(riggingTotal, 30);
  const animHC   = headOf(animDays, 90);
  const lrHC     = headOf(lrDays, 60);
  const fxHC     = headOf(fxDays, 60);
  const compHC   = headOf(compDays, 60);

  const phaseDays = {
    model:   modelTotal>0  ? Math.ceil(modelTotal/modelHC)   : 0,
    lookDev: lookDevTotal>0? Math.ceil(lookDevTotal/lookHC)  : 0,
    rigging: riggingTotal>0? Math.ceil(riggingTotal/rigHC)   : 0,
    anim:    animDays,
    lr:      lrDays,
    fx:      fxDays,
    comp:    compDays,
  };
  const headcounts = {model:modelHC,lookDev:lookHC,rigging:rigHC,anim:animHC,lr:lrHC,fx:fxHC,comp:compHC};

  const phases = [];
  let cur = start;
  const push = (phaseId, days, hc) => {
    if (days<=0) return;
    const end = addDays(cur, days);
    phases.push({id:Date.now()+Math.random(),phaseId,startDate:cur,endDate:end,assignee:`${hc}명`});
    cur = end;
  };

  const prepDays = Math.max(14, Math.round(phaseDays.model*0.25));
  push("pd",        Object.values(phaseDays).reduce((a,b)=>a+b,0)+prepDays*2, 1);
  cur = start;
  push("director",  Object.values(phaseDays).reduce((a,b)=>a+b,0)+prepDays*2, 1);
  cur = start;
  push("supervisor",Object.values(phaseDays).reduce((a,b)=>a+b,0)+prepDays*2, 1);
  cur = start;
  push("design",          prepDays, 1);
  cur = start;
  push("storyboard_reel", prepDays, 1);
  cur = addDays(start, prepDays);
  push("modeling",        phaseDays.model,   headcounts.model);
  push("texture_shading", phaseDays.lookDev, headcounts.lookDev);
  push("rigging",         phaseDays.rigging, headcounts.rigging);
  push("animation_main",  phaseDays.anim,    headcounts.anim);
  push("lighting_render", phaseDays.lr,      headcounts.lr);
  push("fx",              phaseDays.fx,      headcounts.fx);
  push("composition",     phaseDays.comp,    headcounts.comp);

  return {phases, headcounts};
}

  const updateProject  = useCallback((f,v)=>setProject(p=>({...p,[f]:v})),[]);

    setSchedule(p=>{
      const next={...p,[f]:v};
      if (f==="phases") setQuote(q=>({...q,items:syncQuoteFromSchedule(v,q.items)}));
      return next;
    });
  },[]);
  const updateQuote = useCallback((f,v)=>setQuote(p=>({...p,[f]:v})),[]);

  const handleAutoCalc = useCallback(()=>{
    const start = project.startDate || ganttStart;
    const {phases, headcounts} = calcAutoSchedule(project, standards, start);

      const roleId = item.roleId;

        {/* 하단 네비게이션 */}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
          <button onClick={()=>{const i=TABS.findIndex(t=>t.id===activeTab);if(i>0)setActiveTab(TABS[i-1].id);}}
            disabled={activeTab===TABS[0].id}
            style={{...btnBase,background:"#F8F9FA",color:"#6B7280",border:"1px solid #E5E7EB",fontWeight:400,opacity:activeTab===TABS[0].id?0.35:1}}>← 이전</button>
          {activeTab!==TABS[TABS.length-1].id && (
            <button onClick={()=>{const i=TABS.findIndex(t=>t.id===activeTab);if(i<TABS.length-1)setActiveTab(TABS[i+1].id);}}
              style={{...btnBase,background:"#C8102E",color:"#fff"}}>다음 →</button>
          )}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
